name: enchant-diamond-sword
description: Bot enchants a diamond sword with Sharpness V — validates deterministic ENCHANT directive

world:
  type: flat

bots:
  - image: null

steps:
  - instruction: "Enchant diamond sword with Sharpness V"
    give_items:
      - item_id: minecraft:diamond_sword
        count: 1
    directive:
      directive_type: ENCHANT
      target: diamond_sword
      extra:
        enchantment: sharpness
        level: "5"
    timeout: 120
    success:
      inventory_contains:
        item: minecraft:diamond_sword
        min_count: 1
