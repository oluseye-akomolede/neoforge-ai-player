name: enchant-random-tier
description: Bot enchants an iron pickaxe with a random max-tier enchantment — validates random fallback path

world:
  type: flat

bots:
  - image: null

steps:
  - instruction: "Enchant iron pickaxe with random tier 2"
    give_items:
      - item_id: minecraft:iron_pickaxe
        count: 1
    directive:
      directive_type: ENCHANT
      target: iron_pickaxe
      extra:
        option: "2"
    timeout: 120
    success:
      inventory_contains:
        item: minecraft:iron_pickaxe
        min_count: 1
