name: channel-iron-ingot
description: Bot channels iron ingots from XP — validates CHANNEL directive and XP economy

world:
  type: flat

bots:
  - image: null

steps:
  - instruction: "Channel 5 iron ingots"
    directive:
      directive_type: CHANNEL
      target: minecraft:iron_ingot
      count: 5
    timeout: 120
    success:
      inventory_contains:
        item: minecraft:iron_ingot
        min_count: 5
