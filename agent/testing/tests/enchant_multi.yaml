name: enchant-multi-step
description: Bot channels a sword, enchants it with multiple specific enchantments — validates stacking

world:
  type: flat

bots:
  - image: null

steps:
  - instruction: "Enchant diamond sword with Sharpness V"
    give_items:
      - item_id: minecraft:diamond_sword
        count: 1
    directive:
      directive_type: ENCHANT
      target: diamond_sword
      extra:
        enchantment: sharpness
        level: "5"
    timeout: 120
    success:
      inventory_contains:
        item: minecraft:diamond_sword
        min_count: 1

  - instruction: "Enchant diamond sword with Fire Aspect II"
    directive:
      directive_type: ENCHANT
      target: diamond_sword
      extra:
        enchantment: fire_aspect
        level: "2"
    timeout: 120
    success:
      inventory_contains:
        item: minecraft:diamond_sword
        min_count: 1
