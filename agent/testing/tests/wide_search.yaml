name: wide-search-block
description: Bot performs a wide search for dirt — validates WIDE_SEARCH directive on flat world

world:
  type: flat

bots:
  - image: null

steps:
  - instruction: "Wide search for dirt"
    directive:
      directive_type: WIDE_SEARCH
      target: dirt
      radius: 32
      x: 0
      y: 4
      z: 0
      extra:
        search_type: block
        bot_index: "0"
        bot_count: "1"
    timeout: 120
    success:
      directive_completed: true
