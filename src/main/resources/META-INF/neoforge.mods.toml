modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
issueTrackerURL="https://github.com/oluseye-akomolede/neoforge-ai-player/issues"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
description='''
Server-side NeoForge mod that creates an AI-controllable fake player bot.
Exposes an HTTP REST API for LLM integration (Ollama, etc.) to control
the bot's actions: mining, combat, building, navigation, and chat.
'''

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[${neo_version},)"
    ordering="NONE"
    side="SERVER"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="SERVER"

[[dependencies.${mod_id}]]
    modId="ae2"
    type="optional"
    versionRange="[19.0.0,)"
    ordering="AFTER"
    side="SERVER"

[[dependencies.${mod_id}]]
    modId="bettercombat"
    type="optional"
    versionRange="[1.9.0,)"
    ordering="AFTER"
    side="SERVER"